# revquic-client configuration
#
# Load with:  sudo ./bin/revquic-client -config conf/sample_revquic_client.conf
# Any setting here can be overridden on the command line (the CLI always wins).
# Comments must be on their OWN line. Replace every CHANGE_ME_* value before real use.
# Requires root on Linux/macOS (sudo) or Administrator on Windows (TUN + routes).

# --- Broker + identity ---
broker = broker.example.com:4242
region = us-west
# Your issued client token (or an OIDC ID token).
token = CHANGE_ME_CLIENT_TOKEN
# Optional display name (shown in the admin dashboard).
name = my-laptop

# --- Exit selection ---
# Pin a specific exit nodeId; leave unset for automatic load-balancing.
# exit = exit-uswest-1
# Note: -list-exits is a command-line-only action (prints the region's exits, then quits) — do not set it here.

# --- Direct (P2P) path ---
direct = true
# any | p2p-only  (p2p-only only upgrades on a true peer-to-peer pair; otherwise stays on the broker relay).
direct-mode = any
# STUN keepalive cadence on the ICE pair (keeps the NAT binding fresh).
ice-keepalive = 1s
stun = stun:broker.example.com:3478
turn = turn:broker.example.com:3478
turn-user = CHANGE_ME_TURN_USER
turn-pass = CHANGE_ME_TURN_PASS

# --- Per-application proxy (route ONLY the apps you point at it through the exit) ---
# MUTUALLY EXCLUSIVE with full-tunnel below — set one or the other, not both.
# socks = 127.0.0.1:1080

# --- Full-tunnel: send ALL of this machine's traffic through the exit ---
# Requires broker-ip + gw + gw-dev so the pinned broker route survives the default-route override.
full = true
# Broker PUBLIC IP (an IP address, not a hostname) for the pinned host route.
broker-ip = 203.0.113.10
# Current default gateway IP and its device.
# Find with:  ip route show default   (Linux)   /   route -n get default   (macOS)
gw = 192.168.1.1
gw-dev = eth0

# --- Rate limit + QoS reporting ---
rate-bytes = 0
report-interval = 5s

# --- Control-plane + direct-path mTLS (client leaf cert) ---
tls-ca          = certs/ca.pem
tls-cert        = certs/client-cert.pem
tls-key         = certs/client-key.pem
# Must match a SAN in the broker certificate.
tls-server-name = broker.example.com

# --- Logging: text | json ---
log-type = text
# log-file = revquic-client.log
