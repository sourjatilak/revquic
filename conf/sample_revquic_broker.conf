# revquic-broker configuration
#
# Load with:  ./bin/revquic-broker -config conf/sample_revquic_broker.conf
# Any setting here can be overridden on the command line (the CLI always wins).
# Comments must be on their OWN line (start with # or ;) — inline comments are NOT supported.
# Replace every CHANGE_ME_* value before real use.

# --- Listeners ---
quic = 0.0.0.0:4242
http = 0.0.0.0:8089

# --- Serve the admin dashboard/API over HTTPS (optional; omit for plain HTTP) ---
# http-tls-cert = certs/http-cert.pem
# http-tls-key  = certs/http-key.pem

# --- Storage backend: mem | file | sqlite ---
store   = sqlite
userdb  = user.db
admindb = admin.db
# QoS event-history path (file/sqlite). Defaults to qos.db / qos-history.jsonl if unset.
# qosdb = qos.db

# --- Admin credentials (dashboard + REST API) ---
admin-user = admin
admin-pass = CHANGE_ME_ADMIN_PASSWORD
# Optional bootstrap bearer token for the admin API.
# admin-token = CHANGE_ME_ADMIN_TOKEN

# --- Secrets ---
# Pepper used to hash client tokens at rest. MUST stay stable — changing it invalidates every token.
cred-pepper = CHANGE_ME_PEPPER
# Shared secret each exit node must present on register (the exit's -token must match this).
node-token = CHANGE_ME_NODE_SECRET

# --- Seed a client user (convenience; for many users prefer the admin dashboard/API) ---
# Format: token:region[,region]
seed-user = CHANGE_ME_CLIENT_TOKEN:us-west
# Seed an OIDC user instead (no token; authenticated via OIDC). Format: email:region[,region]
# seed-oidc-user = alice@example.com:us-west

# --- Exit load-balancing strategy: least-conn | round-robin | random ---
lb = least-conn

# --- Session resumption: how long a disconnected client's session stays resumable ---
# (same exit + same VPN IP on reconnect). Set to 0 to disable resume (immediate teardown).
session-resume-ttl = 1h

# --- Control-plane mTLS (broker leaf cert; its SAN must include the hostname clients dial) ---
tls-ca   = certs/ca.pem
tls-cert = certs/broker-cert.pem
tls-key  = certs/broker-key.pem

# --- OIDC user authentication (optional) ---
# oidc-issuer    = https://idp.example.com
# oidc-audience  = revquic
# oidc-jwks-url  = https://idp.example.com/keys
# oidc-jwks-file = /etc/revquic/jwks.json

# --- STUN/TURN advertised to peers. The broker mints per-session TURN REST creds from turn-secret ---
# (run coturn with --use-auth-secret --static-auth-secret=<turn-secret>).
stun-url    = stun:broker.example.com:3478
turn-url    = turn:broker.example.com:3478
turn-secret = CHANGE_ME_TURN_SECRET

# --- Logging: text | json ---
log-type = text
# log-file = /var/log/revquic-broker.log
