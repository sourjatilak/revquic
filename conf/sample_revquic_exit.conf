# revquic-exit configuration
#
# Load with:  sudo ./bin/revquic-exit -config conf/sample_revquic_exit.conf
# Any setting here can be overridden on the command line (the CLI always wins).
# Comments must be on their OWN line. Replace every CHANGE_ME_* value before real use.
# Requires Linux + root (TUN + iptables). On Windows 11, run as Administrator (WinNAT).

# --- Broker ---
broker = broker.example.com:4242

# --- Identity ---
nodeId = exit-uswest-1
# Optional display name (shown in the admin dashboard + local status UI). If nodeId is empty it is
# derived from name (slugified + a random suffix).
name = i5-nuc
region = us-west
# Max concurrent client sessions this exit accepts (0 = broker default of 100).
capacity = 0

# --- Local status web UI (no auth; bind to localhost only). Use 'off' or empty to disable. ---
status-addr = 127.0.0.1:8085

# --- Data plane ---
# WAN interface to MASQUERADE out of. MUST be the real internet-facing NIC.
# Find it with:  ip route get 1.1.1.1   (look at the 'dev <iface>' field; often ens5/enp1s0, not eth0)
uplink = eth0
# Exit-side TUN gateway CIDR.
gw = 10.99.0.1/24
# Per-tenant isolation: block client<->client and client<->LAN (Linux only; no-op on Windows).
isolate = true
# Per-session egress cap in bytes/sec (0 = unlimited). 625000000 ~= 5 Gbit/s.
rate-bytes = 625000000
# QoS report cadence to the broker (0 disables).
report-interval = 5s

# --- Node authentication (shared secret expected by the broker; must equal the broker's node-token) ---
token = CHANGE_ME_NODE_SECRET

# --- Direct (P2P) path ---
direct = true
# any | p2p-only  (p2p-only stays on the broker relay instead of a slower TURN-relayed "direct" path).
direct-mode = any
# STUN keepalive cadence on the ICE pair (keeps the NAT binding fresh; lower = more resilient).
ice-keepalive = 1s
stun = stun:broker.example.com:3478
turn = turn:broker.example.com:3478
turn-user = CHANGE_ME_TURN_USER
turn-pass = CHANGE_ME_TURN_PASS

# --- Control-plane + direct-path mTLS (node leaf cert) ---
tls-ca          = certs/ca.pem
tls-cert        = certs/node-cert.pem
tls-key         = certs/node-key.pem
tls-server-name = broker.example.com

# --- Logging: text | json ---
log-type = text
# log-file = /var/log/revquic-exit.log
