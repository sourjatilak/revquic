# OIDC end-to-end smoke with a Dex IdP. The client fetches an ID token from Dex (password grant);
# the broker verifies it (JWKS) and maps the email claim to the seeded OIDC user.
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml up --build -d
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml logs --tail=30 client dex
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml down -v
name: revquic-smoke

services:
  dex:
    build:
      context: ..
      dockerfile: docker/dex/Dockerfile
    networks: [revquic]

  server:
    command: ["-quic", ":4242", "-http", ":8080", "-admin-token", "admin-secret",
              "-node-token", "node-secret",
              "-oidc-issuer", "http://dex:5556/dex", "-oidc-audience", "revquic",
              "-oidc-jwks-url", "http://dex:5556/dex/keys",
              "-seed-oidc-user", "alice@example.com:us-west"]
    depends_on: [dex]

  client:
    environment:
      BROKER: "server:4242"
      ADMIN: "server:8080"
      REGION: "us-west"
      ADMIN_TOKEN: "admin-secret"
      OIDC: "1"
      DEX_TOKEN_URL: "http://dex:5556/dex/token"
      DEX_CLIENT_ID: "revquic"
      DEX_CLIENT_SECRET: "revquic-secret"
      DEX_USER: "alice@example.com"
      DEX_PASS: "password"
    depends_on: [server, exit, dex]
