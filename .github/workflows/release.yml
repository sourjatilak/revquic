# Builds cross-platform binaries and publishes them to a GitHub Release on tag push (vX.Y.Z).
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v0.1.0) for a manual run'
        required: true

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so `git describe`/`git archive` work

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: ver
        run: echo "version=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build cross-platform archives + checksums + source tarball
        run: make package VERSION=${{ steps.ver.outputs.version }}

      - name: List artifacts
        run: ls -la dist

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Revquic ${{ steps.ver.outputs.version }}
          tag_name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
