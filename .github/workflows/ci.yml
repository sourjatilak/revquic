# Format, vet, build, and test on every push and pull request.
name: ci

on:
  push:
    branches: [main, mainline]
  pull_request:

env:
  CGO_ENABLED: '0' # pure-Go build (modernc.org/sqlite); matches the Makefile invariant

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: build (host + linux cross-check)
        run: |
          go build ./...
          GOOS=linux GOARCH=arm64 go build ./...

      - name: test
        run: go test ./...
